name: Snapshot docker build and push

# Reusable workflow — invoked by pr-pipeline.yml.
# Runs only when ci-tests succeeded (enforced by the orchestrator via `needs`).
# Pushing to GHCR requires a writable token: works for same-repo PRs; fork PRs
# (read-only token) are filtered upstream by the orchestrator.

on:
  workflow_call:

permissions:
  packages: write
  contents: read

jobs:
  docker-build:
    name: 📦 Docker Build and Push
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout PR head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}

      - name: Sanitize branch name for Docker tag
        id: sanitize-branch
        run: |
          SAFE_BRANCH_NAME=$(echo "${{ github.head_ref }}" | tr '/' '-')
          echo "safe_branch=$SAFE_BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Run Snapshot Docker Build/Push
        # https://github.com/pagopa/github-actions-template/releases/tag/v2.4.1
        uses: pagopa/github-actions-template/payments-flow-docker-snapshot@713f5abd8f8ee210e5f6a4243ae52eb7c1b3b5ab
        with:
          current_branch: ${{ steps.sanitize-branch.outputs.safe_branch }}
