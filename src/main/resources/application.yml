cors:
  allowed-origins: "\${CORS_ALLOWED_ORIGINS:http://localhost:5173}"

spring:
  application:
    name: ${artifactId}
    version: ${version}
  jmx.enabled: true
  threads:
    virtual:
      enabled: true

management:
  info:
    build.enabled: true
    java.enabled: true
    git.enabled: true
  otlp.metrics.export.enabled: "\${TRACING_EXPORT:false}"
  tracing:
    sampling.probability: "\${TRACING_SAMPLING_PROBABILITY:1.0}"
  observations:
    http.server:
      filter.order: -100
  endpoints:
    jmx:
      exposure.include: "*"
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  endpoint:
    health:
      probes.enabled: true
      logging.slow-indicator-threshold: "\${HEALTH_ACTUATOR_LOGGER_TIMEOUT_DURATION:PT1S}"
      show-details: "\${HEALTH_ACTUATOR_SHOW_DETAILS:when-authorized}"
      group:
        readiness.include: "*"
        liveness.include: livenessState,diskSpace,ping
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${artifactId}
    export:
      prometheus:
        enabled: true
        step: 1m
        descriptions: true
    enable:
      jvm: true
      process: true
      system: true
      http: true
      logback: true

logging:
  level:
    root: "\${LOG_LEVEL_ROOT:INFO}"
    it.gov.pagopa: "\${LOG_LEVEL_PAGOPA:INFO}"
    org.springframework: "\${LOG_LEVEL_SPRING:INFO}"
    org.springframework.boot.availability: "\${LOG_LEVEL_SPRING_BOOT_AVAILABILITY:DEBUG}"
    it.gov.pagopa.template.exception.ControllerExceptionHandler: "\${LOGGING_LEVEL_API_REQUEST_EXCEPTION:INFO}"
    org.springdoc.core.utils.SpringDocAnnotationsUtils: "\${LOG_LEVEL_SPRING_DOC:ERROR}"
    PERFORMANCE_LOG: "\${LOG_LEVEL_PERFORMANCE_LOG:INFO}"
    PERFORMANCE_LOG.API_REQUEST: "\${LOG_LEVEL_PERFORMANCE_LOG_API_REQUEST:\${logging.level.PERFORMANCE_LOG}}"
    PERFORMANCE_LOG.REST_INVOKE: "\${LOG_LEVEL_PERFORMANCE_LOG_REST_INVOKE:\${logging.level.PERFORMANCE_LOG}}"
    # Logging between webclient and keycloak
    # org.springframework.web.reactive.function.client.ExchangeFunctions: TRACE

rest:
  defaults:
    connection-pool:
      # Maximum live connections per remote host.
      # Reactor Netty isolates one bucket per (host, port) — N connectors → N independent buckets.
      size: "\${WEBCLIENT_POOL_MAX_CONNECTIONS:300}"
      size-per-route: "\${WEBCLIENT_POOL_MAX_CONNECTIONS_PER_ROUTE:50}"
      # Azure LB silently closes TCP connections idle for >4 min.
      # Keep maxIdleTime below that threshold so the pool evicts stale connections first.
      max-idle-time-seconds: "\${WEBCLIENT_POOL_MAX_IDLE_TIME_SECONDS:20}"
      # Hard upper bound on connection lifetime regardless of activity.
      max-life-time-seconds: "\${WEBCLIENT_POOL_MAX_LIFE_TIME_SECONDS:60}"
      # Cap the waiting queue: 2x maxConnections avoids unbounded memory growth under backpressure.
      pending-acquire-max-count: "\${WEBCLIENT_POOL_PENDING_ACQUIRE_MAX_COUNT:600}"
      # Fail-fast when pool is fully saturated — prevents cascading latency.
      pending-acquire-timeout-seconds: "\${WEBCLIENT_POOL_PENDING_ACQUIRE_TIMEOUT_SECONDS:5}"
      # Background eviction task period — proactively removes idle/expired connections.
      evict-in-background-seconds: "\${WEBCLIENT_POOL_EVICT_IN_BACKGROUND_SECONDS:30}"
      # Kept for backward-compat (no longer used by the pool builder).
      time-to-live-minutes: "\${WEBCLIENT_POOL_TIME_TO_LIVE_MINUTES:1}"
    timeout:
      # TCP handshake timeout.
      connect-millis: "\${WEBCLIENT_TIMEOUT_CONNECT_MILLIS:5000}"
      # Netty pipeline read inactivity guard (per-event, not end-to-end).
      # Should be >= response-millis so the inactivity guard never fires before the end-to-end cap.
      read-millis: "\${WEBCLIENT_TIMEOUT_IO_MILLIS:8000}"
      # Netty pipeline write inactivity guard. Defaults to read-millis if not set.
      write-millis: "\${WEBCLIENT_TIMEOUT_WRITE_MILLIS:8000}"
      # End-to-end response timeout — hard cap for the entire request/response cycle.
      # Constraint for graceful shutdown: N_sequential_calls × response-millis + db_overhead ≤ spring.lifecycle.timeout (20s).
      # Here N=1 (single WebClient call per pipeline) → 1×8s + 2s DB = 10s ≤ 20s.
      response-millis: "\${WEBCLIENT_TIMEOUT_RESPONSE_MILLIS:8000}"
  client:
    tpp:
      base-url: "\${EMD_TPP}"

keycloak:
  auth-server-url: "\${KEYCLOAK_AUTH_URL}"
  realm: "\${KEYCLOAK_REALM}"
  idp-alias: "\${KEYCLOAK_IDP_ALIAS}"
  manager:
    client-id: "\${KEYCLOAK_MANAGER_CLIENT_ID}"
    client-secret: "\${KEYCLOAK_MANAGER_CLIENT_SECRET}"
  ar-backoffice:
    client-id: "\${KEYCLOAK_BACKOFFICE_CLIENT_ID}"
    client-secret: "\${KEYCLOAK_BACKOFFICE_CLIENT_SECRET}"
  groups:
    tpp-name: "\${KEYCLOAK_TPP_GROUP_NAME}"


auth:
  sc:
    # SELFCARE
    jwk-set-uri: "\${SC_JWT_SET_URI}"
    expected-issuer: "\${SC_AUTH_EXPECTED_ISSUER}"
    expected-audience: "\${SC_AUTH_EXPECTED_AUDIENCE}"
